name: Build OpenClaw Bundles

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            arch: arm64
            asset_name: openclaw-macos-arm64.tgz
          - os: macos-14
            platform: macos
            arch: x64
            asset_name: openclaw-macos-x64.tgz
          - os: windows-2022
            platform: windows
            arch: arm64
            asset_name: openclaw-windows-arm64.tgz
          - os: windows-2022
            platform: windows
            arch: x64
            asset_name: openclaw-windows-x64.tgz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build archive
        run: node scripts/download-openclaw.js
        env:
          npm_config_arch: ${{ matrix.arch }}

      - name: Rename archive
        shell: bash
        run: |
          cp dist/openclaw.tgz "dist/${{ matrix.asset_name }}"
          cp dist/openclaw.manifest.json "dist/${{ matrix.asset_name }}.manifest.json"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.manifest.json
          retention-days: 7

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten assets
        shell: bash
        run: |
          mkdir -p final-assets
          find release-assets -type f -maxdepth 2 -exec cp {} final-assets/ \;
          ls -lh final-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenClaw Bundles ${{ github.ref_name }}
          body: |
            Platform-specific OpenClaw bundles built from npm version `${{ matrix.asset_name }}`.
          files: final-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
