name: Build OpenClaw Bundles

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            arch: arm64
          - os: macos-14
            platform: macos
            arch: x64
          - os: windows-2022
            platform: windows
            arch: arm64
          - os: windows-2022
            platform: windows
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build archive
        run: node scripts/download-openclaw.js
        env:
          npm_config_arch: ${{ matrix.arch }}

      - name: Resolve asset metadata
        id: asset_meta
        shell: bash
        run: |
          OPENCLAW_VERSION="$(node -e "const fs=require('fs'); const manifest=JSON.parse(fs.readFileSync('dist/openclaw.manifest.json','utf8')); const version=String(manifest.version || '').trim(); if (!version) throw new Error('Missing openclaw version in manifest'); const match = version.match(/^(\d{4})\.(\d{1,2})\.(\d{1,2})$/); const display = match ? \`v\${match[1]}.\${match[2].padStart(2,'0')}.\${match[3].padStart(2,'0')}\` : \`v\${version}\`; process.stdout.write(display);")"
          ASSET_BASENAME="${GITHUB_REF_NAME}-${OPENCLAW_VERSION}-sudoclaw-${{ matrix.platform }}-${{ matrix.arch }}"
          echo "openclaw_version=${OPENCLAW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset_basename=${ASSET_BASENAME}" >> "$GITHUB_OUTPUT"

      - name: Rename archive
        shell: bash
        run: |
          cp dist/openclaw.tgz "dist/${{ steps.asset_meta.outputs.asset_basename }}.tgz"
          cp dist/openclaw.manifest.json "dist/${{ steps.asset_meta.outputs.asset_basename }}.manifest.json"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.asset_meta.outputs.asset_basename }}
          path: |
            dist/${{ steps.asset_meta.outputs.asset_basename }}.tgz
            dist/${{ steps.asset_meta.outputs.asset_basename }}.manifest.json
          retention-days: 7

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten assets
        shell: bash
        run: |
          mkdir -p final-assets
          find release-assets -type f -maxdepth 2 -exec cp {} final-assets/ \;
          ls -lh final-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Sudoclaw Bundles ${{ github.ref_name }}
          body: |
            Platform-specific Sudoclaw bundles for `${{ github.ref_name }}`.

            Release asset filenames include both the repo tag and the bundled OpenClaw version.
          files: final-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
